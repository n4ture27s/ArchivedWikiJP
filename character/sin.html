<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ArchivedJPWiki</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/javascript/version.js"></script>
    <link rel="stylesheet" href="/css/stylesheet.css" id="main-stylesheet">
    <script>document.getElementById("main-stylesheet").href = "/css/stylesheet.css?v=" + APP_VERSION;</script>
</head>

<body data-page="sin">
    <div id="header">
        <header>
            <h1 id="logo"><a id="AtagLogo" href="/index.html">Archived JP Wiki</a></h1>

        </header>
    </div>


    <main>
        <div id="sideflex">
            <div id="sidebar-container"></div>
            <div id="main-content">
                <div id="tooltip"></div>
                <div class="w-back">
                    <p id="w-title">罪</p>
                    <hr class="hr-main">
                    <details id="content-list" open>
                        <summary id="content-list-title">目次</summary>
                        <div id="content-list-inner">
                            <a href="#skills">罪の割り振り(スキルツリー)</a>
                        </div>
                    </details>
                    <p id="skills" class="w-subtitle heading">罪の割り振り</p>
                    <div class="skill-wrapper">

                        <!-- 左：ツリー -->
                        <div class="skill-tree" id="skill-tree">
                        </div>

                        <!-- 右：詳細 -->
                        <div class="skill-detail" id="detail-panel">
                            <h2 id="skill-title">select skill</h2>
                            <p id="skill-desc">スキルを選択してください</p>

                            <div id="skill-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </main>





    <!--この下に書くとライセンス表記の下に出てきちゃうので注意-->
    <div id="footer-container"></div>

    <script>document.write('<script src="/javascript/loader.js?v='+APP_VERSION+'"><\/script>');</script>
</body>

</html>
