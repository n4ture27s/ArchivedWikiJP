    <main>
        <div id="sideflex">
            <div id="sidebar-container"></div>
            <div id="main-content">

                <div class="w-back">
                    <p id="w-title" >トレス協会</p>
                    <ruby id="w-comment">「特許?そんなの俺たちには関係ねえよ」</ruby>
                    <p id="description" class="w-subtitle heading">説明</p>    
                    <div class="text-area">
                        <p>トレス協会の主に工房の統括管理、工房が作った武器や道具を審査する役割を持っています。</p>
                        <p>トレス協会には武器がなく、代わりに武器を作成するというアイテムを入手することができます。</p>
                        <p>トレス協会に所属すると、いつでもどこでも素材さえあれば武器を作ることができます。(作れる武器には限りがある)</p>
                        <p>トレス協会に所属する方法は、ユリアクエストラインをクリアしたのちに、エブリシングワークショップ前にいるユリアに話しかけ、10mを渡すことで所属することができます。</p>
                    </div>
