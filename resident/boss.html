<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ArchivedJPWiki</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/javascript/version.js"></script>
    <style>html{background-color: #1a1a1a;}</style>
    <link rel="stylesheet" href="/css/stylesheet.css" id="main-stylesheet">
    <script>document.getElementById("main-stylesheet").href = "/css/stylesheet.css?v=" + APP_VERSION;</script>
</head>

<body data-page="boss-list">
    <div id="header">
        <header>
            <h1 id="logo"><a id="AtagLogo" href="/index.html">Archived JP Wiki</a></h1>
        </header>
    </div>

    <main>
        <div id="sideflex">
            <div id="sidebar-container"></div>
            <div id="main-content">
                <div id="tooltip"></div>
                <div class="w-back">
                    <p id="w-title">ボス</p>
                    <ruby id="w-comment">「Those who stand above the rest, commanding fear and respect.」 <rt>群を抜いて恐れられ、敬意を集める存在。</rt></ruby>

                    <hr class="hr-main">
                    <details id="content-list" open>
                        <summary id="content-list-title">目次</summary>
                        <div id="content-list-inner">
                            <a href="#description">説明</a>
                            <a href="#bosses">ボス一覧</a>
                        </div>
                    </details>
                    <p id="description" class="w-subtitle heading">説明</p>
                    <div class="text-area">
                        <p>ボスは通常の敵より強力な存在で、特有の攻撃パターンと高いステータスを持つ。オーバーワールドボス、シティボス、死刑宣告の3カテゴリに分類される。</p>
                        <p>多くのボスはプレイヤーと同じページを使用する。そのため、一部の攻撃は本のページ一覧でも確認できる。</p>
                    </div>

                    <p id="bosses" class="w-subtitle heading">ボス一覧</p>
                    <div class="controls">
                        <input type="text" class="search" id="boss-search" placeholder="ボス名検索...">
                    </div>
                    <div id="boss-list-container"></div>
                    <div id="boss-detail"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>document.write('<script src="/javascript/loader.js?v='+APP_VERSION+'"><\/script>');</script>
</body>

</html>
