<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ArchivedJPWiki</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/stylesheet.css">
</head>

<body data-page="update-log">
    <div id="header">
        <header>
            <h1 id="logo"><a id="AtagLogo" href="index.html">Archived JP Wiki</a></h1>

        </header>
    </div>


    <main>
        <div id="sideflex">
            <div id="sidebar-container"></div>
            <div id="main-content">
                <div id="main-inner">
                    <div class="update-log">
                        <div class="filter-buttons">
                            <button class="pressed" onclick="LogFilter('all')">すべて</button>
                            <button onclick="LogFilter('add')">追加</button>
                            <button onclick="LogFilter('fix')">修正</button>
                            <button onclick="LogFilter('change')">変更</button>
                            <button onclick="LogFilter('remove')">削除</button>
                        </div>
                        <details open>
                            <summary>2026/05/04 <span class="new">NEW!</span></summary>
                            <p class="log add">[追加]なし</p>
                            <p class="log fix">[修正]コードバグによりクリティカルが表示されない問題を修正</p>
                            <p class="log change">[変更]なし</p>
                            <p class="log remove">[削除]なし</p>
                        </details>
                        <details>
                            <summary>2026/05/04</summary>
                            <p class="log add">WIKI公開(CloudFlare)</p>
                        </details>

                    </div>
                </div>
            </div>
        </div>
    </main>





    <!--この下に書くとライセンス表記の下に出てきちゃうので注意-->
    <div id="footer-container"></div>

    <script src="javascript/loader.js"></script>
</body>

</html>
