<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ArchivedJPWiki</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/javascript/version.js"></script>
    <style>html{background-color: #1a1a1a;}</style>
    <link rel="stylesheet" href="/css/stylesheet.css" id="main-stylesheet">
    <script>document.getElementById("main-stylesheet").href = "/css/stylesheet.css?v=" + APP_VERSION;</script>
</head>

<body data-page="outfit-detail">
    <div id="header">
        <header>
            <h1 id="logo"><a id="AtagLogo" href="/index.html">Archived JP Wiki</a></h1>
        </header>
    </div>

    <main>
        <div id="sideflex">
            <div id="sidebar-container"></div>
            <div id="main-content">
                <div id="tooltip"></div>
                <div class="w-back">
                    <button class="btn-back" onclick="history.back()">← 戻る</button>
                    <p id="w-title"></p>
                    <hr class="hr-main">
                    <p id="description" class="w-subtitle heading">説明</p>
                    <div class="text-area">
                        <div class="outfit-detail">

                            <div class="outfit-header">
                                <h1 id="outfit-name-en"></h1>
                                <p id="outfit-name-jp"></p>
                            </div>

                            <div class="outfit-stats-box">
                                <div id="outfit-stats">
                                </div>
                            </div>

                            <div class="outfit-section">
                                <h2>キーページ</h2>
                                <div id="outfit-keypage-container"></div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>document.write('<script src="/javascript/loader.js?v='+APP_VERSION+'"><\/script>');</script>
</body>

</html>
