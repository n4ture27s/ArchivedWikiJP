<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ArchivedJPWiki</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/stylesheet.css">
</head>

<body>
    <div id="header">
        <header>
            <h1 id="logo"><a id="AtagLogo" href="/index.html">Archived JP Wiki</a></h1>

        </header>
    </div>


    <main>
        <div id="sideflex">
            <div id="sidebar-container"></div>
            <div id="main-content">
                <div id="tooltip"></div>
                <div class="w-back">
                    <button onclick="history.back()">← 戻る</button>
                    <p id="w-title"></p>
                    <hr class="hr-main">
                    <p id="description" class="w-subtitle heading">説明</p>
                    <div class="text-area">
                        <div class="weapon-detail">

                            <div class="weapon-header">
                                <h1 id="name-en"></h1>
                                <p id="name-jp"></p>
                            </div>

                            <div class="weapon-stats-box">
                                <div id="stats">
                                </div>
                            </div>
                            <div class="weapon-section">
                                <h2>Basic Attack（通常攻撃）</h2>
                                <div class="attack-box">
                                    <video class="attack-vid" id="basic-vid" autoplay loop muted>
                                    <div class="attack-info">
                                        <p id="basic-desc"></p>
                                        <p id="basic-effect" class="effect"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="weapon-section">
                                <h2>Critical（クリティカル）</h2>
                                <div class="attack-box">
                                    <video class="attack-vid" id="crit-vid" autoplay loop muted>
                                    <div class="attack-info">
                                        <p id="crit-desc"></p>
                                        <p id="crit-ct" class="ct"></p>
                                        <p id="crit-effect" class="effect"></p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
        </div>
        </div>
    </main>





    <!--この下に書くとライセンス表記の下に出てきちゃうので注意-->
    <div id="footer-container"></div>

    <script src="/javascript/weapon_detail.js"></script>
    <script src="/javascript/main.js"></script>
</body>

</html>
