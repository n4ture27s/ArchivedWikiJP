<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ArchivedJPWiki</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/stylesheet.css">
</head>

<body>
    <div id="header">
        <header>
            <h1 id="logo"><a id="AtagLogo" href="/index.html">Archived JP Wiki</a></h1>

        </header>
    </div>


    <main>
        <div id="sideflex">
            <div id="sidebar-container"></div>
            <div id="main-content">
                <div id="tooltip"></div>
                <div class="w-back">
                    <button onclick="history.back()">← 戻る</button>
                    <p id="w-title"></p>
                    <hr class="hr-main">
                    <p id="description" class="w-subtitle heading">説明</p>
                    <div class="text-area">
                        <div class="weapon-detail">

                            <div class="weapon-header">
                                <h1 id="name-en"></h1>
                                <p id="name-jp"></p>
                            </div>

                            <div class="weapon-stats-box">
                                <div id="stats">
                                </div>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>
        </div>
        </div>
    </main>
